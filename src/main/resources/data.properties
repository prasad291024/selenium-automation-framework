# Framework-level fallback configuration
# App-specific config lives in: src/main/resources/config/{app}/{env}.properties
# This file is used as last resort fallback only

# Execution
browser=chrome
execution.mode=local
default.timeout=30
default.polling=500

# Selenium Grid
selenium.grid.url=http://localhost:4444/wd/hub

# Cloud Grid (use GitHub Secrets in CI)
browserstack.username=YOUR_BROWSERSTACK_USERNAME
browserstack.accesskey=YOUR_BROWSERSTACK_ACCESS_KEY
lambdatest.username=YOUR_LAMBDATEST_USERNAME
lambdatest.accesskey=YOUR_LAMBDATEST_ACCESS_KEY

# Database (Optional)
db.url=jdbc:mysql://localhost:3306/testdb
db.username=${DB_USERNAME}
db.password=${DB_PASSWORD}
