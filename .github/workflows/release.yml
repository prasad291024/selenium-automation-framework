name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:

  release:
    name: 🚀 Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 Release ${{ github.ref_name }}

            ### What's Changed
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for full details.

            ### Quick Start
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd selenium-automation-framework
            mvn test -Dsurefire.suiteXmlFiles=testng_vwo_pom.xml
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack - New Release
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚀 *New Release Published*: `${{ github.ref_name }}`\n*Repository*: ${{ github.repository }}\n*Link*: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
