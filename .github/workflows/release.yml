name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build Project
        run: mvn clean package -DskipTests

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body: |
            ## Release ${{ github.ref_name }}

            ### What's Changed
            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for full details.

            ### Quick Start (Multi-App)
            ```bash
            git clone https://github.com/${{ github.repository }}.git
            cd selenium-automation-framework

            # VWO UI suite
            mvn test -Dapp=vwo -Dsurefire.suiteXmlFiles=testng_vwo.xml

            # OrangeHRM UI suite
            mvn test -Dapp=orangehrm -Dsurefire.suiteXmlFiles=testng_orangehrm.xml

            # Katalon UI suite
            mvn test -Dapp=katalon -Dsurefire.suiteXmlFiles=testng_katalon.xml
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Slack - New Release
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "*New Release Published*: `${{ github.ref_name }}`\n*Repository*: `${{ github.repository }}`\n*Link*: ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}"
            }
        env:
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
