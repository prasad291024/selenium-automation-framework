name: PR Checks

on:
  pull_request:
    branches: [ master, develop ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn clean compile -q

  ui-matrix-tests:
    name: UI Tests - ${{ matrix.app }} (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: build-verification
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: vwo
            browser: chrome
            suite: testng_vwo.xml
          - app: vwo
            browser: chrome
            suite: testng_vwo_bdd.xml
          - app: orangehrm
            browser: chrome
            suite: testng_orangehrm.xml
          - app: orangehrm
            browser: chrome
            suite: testng_orangehrm_bdd.xml
          - app: katalon
            browser: chrome
            suite: testng_katalon.xml
          - app: katalon
            browser: chrome
            suite: testng_katalon_bdd.xml
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run UI Suite
        env:
          VWO_USERNAME: ${{ secrets.VWO_USERNAME }}
          VWO_PASSWORD: ${{ secrets.VWO_PASSWORD }}
          VWO_INVALID_USERNAME: ${{ secrets.VWO_INVALID_USERNAME }}
          VWO_INVALID_PASSWORD: ${{ secrets.VWO_INVALID_PASSWORD }}
          VWO_EXPECTED_USERNAME: ${{ secrets.VWO_EXPECTED_USERNAME }}
          OHR_USERNAME: ${{ secrets.OHR_USERNAME }}
          OHR_PASSWORD: ${{ secrets.OHR_PASSWORD }}
          KATALON_USERNAME: ${{ secrets.KATALON_USERNAME }}
          KATALON_PASSWORD: ${{ secrets.KATALON_PASSWORD }}
          KATALON_INVALID_USERNAME: ${{ secrets.KATALON_INVALID_USERNAME }}
          KATALON_INVALID_PASSWORD: ${{ secrets.KATALON_INVALID_PASSWORD }}
          APP_USERNAME: ${{ secrets.APP_USERNAME }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          APP_INVALID_USERNAME: ${{ secrets.APP_INVALID_USERNAME }}
          APP_INVALID_PASSWORD: ${{ secrets.APP_INVALID_PASSWORD }}
          APP_EXPECTED_USERNAME: ${{ secrets.APP_EXPECTED_USERNAME }}
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
          LAMBDATEST_USERNAME: ${{ secrets.LAMBDATEST_USERNAME }}
          LAMBDATEST_ACCESS_KEY: ${{ secrets.LAMBDATEST_ACCESS_KEY }}
        run: |
          mvn clean test \
            -Dapp=${{ matrix.app }} \
            -Dbrowser=${{ matrix.browser }} \
            -Denv=qa \
            -DretryCount=0 \
            -Dsurefire.suiteXmlFiles=${{ matrix.suite }}

      - name: Generate JaCoCo Report
        if: always()
        run: mvn jacoco:report

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.app }}-${{ matrix.browser }}
          path: |
            target/surefire-reports/
            target/site/allure-maven-plugin/
            target/site/jacoco/
          retention-days: 30

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: build-verification
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle
        run: mvn checkstyle:check
        continue-on-error: true

      - name: SonarQube Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=selenium-automation-framework \
            -Dsonar.organization=prasad291024 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build-verification
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: OWASP Dependency Check
        run: mvn dependency-check:check
        continue-on-error: true

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: target/dependency-check-report.html
          retention-days: 30

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: build-verification
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker Compose
        run: docker compose config

      - name: Pull Docker Images
        run: docker compose pull
        continue-on-error: true

  notify-success:
    name: Notify Success
    runs-on: ubuntu-latest
    needs: [ ui-matrix-tests, code-quality, security-scan, docker-build ]
    if: success() && secrets.SLACK_WEBHOOK_URL != ''
    steps:
      - name: Notify Slack - All Checks Passed
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "*All Checks Passed* on PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}\n*Branch*: `${{ github.head_ref }}`\n*Author*: `${{ github.actor }}`\n*Link*: ${{ github.event.pull_request.html_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
