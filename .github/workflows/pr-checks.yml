name: PR Checks & Merge Workflow

on:
  pull_request:
    branches: [ master, develop ]
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ master, develop ]

jobs:
  # ========================================
  # PRE-MERGE CHECKS
  # ========================================
  
  build-check:
    name: 🔨 Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Build with Maven
        run: mvn clean compile -DskipTests
      
      - name: ✅ Build Success
        if: success()
        run: echo "Build completed successfully"

  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Run Unit Tests
        run: mvn test -Dtest=*Unit*
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: unit-test-results
          path: target/surefire-reports/

  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-latest
    needs: build-check
    strategy:
      matrix:
        browser: [chrome, firefox]
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Install Browser
        run: |
          if [ "${{ matrix.browser }}" == "chrome" ]; then
            sudo apt-get update
            sudo apt-get install -y google-chrome-stable
          else
            sudo apt-get update
            sudo apt-get install -y firefox
          fi
      
      - name: Run Integration Tests
        run: mvn test -Dbrowser=${{ matrix.browser }} -Dsurefire.suiteXmlFiles=testng_vwo_pom.xml
      
      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v3
        with:
          name: screenshots-${{ matrix.browser }}
          path: screenshots/

  code-quality:
    name: 📊 Code Quality Check
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: SonarQube Scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=selenium-framework \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.login=${{ secrets.SONAR_TOKEN }}
      
      - name: Quality Gate Check
        run: echo "Quality gate passed"

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build-check
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Dependency Check
        run: mvn dependency-check:check
      
      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: target/dependency-check-report.html

  code-coverage:
    name: 📈 Code Coverage
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Generate Coverage Report
        run: mvn jacoco:report
      
      - name: Check Coverage Threshold
        run: mvn jacoco:check -Djacoco.minimum.coverage=0.70
      
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: coverage-report
          path: target/site/jacoco/

  lint-check:
    name: 🎨 Code Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Run Checkstyle
        run: mvn checkstyle:check

  # ========================================
  # POST-MERGE ACTIONS
  # ========================================

  post-merge-develop:
    name: 🚀 Deploy to Dev Environment
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, code-quality, security-scan]
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to Dev
        run: echo "Deploying to Dev environment"
      
      - name: Run Smoke Tests
        run: mvn test -Denv=dev -Dtest=*Smoke*
      
      - name: Notify Team
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '✅ Merged to develop - Deployed to Dev'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  post-merge-master:
    name: 🎉 Deploy to Production
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, code-quality, security-scan]
    steps:
      - uses: actions/checkout@v3
      
      - name: Create Release Tag
        run: |
          VERSION=$(date +%Y.%m.%d.%H%M)
          git tag -a "v$VERSION" -m "Release v$VERSION"
          git push origin "v$VERSION"
      
      - name: Deploy to Production
        run: echo "Deploying to Production environment"
      
      - name: Run Smoke Tests
        run: mvn test -Denv=prod -Dtest=*Smoke*
      
      - name: Generate Release Notes
        uses: release-drafter/release-drafter@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Notify Team
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: '🎉 Merged to master - Deployed to Production'
          webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}

  cleanup-branch:
    name: 🧹 Cleanup Feature Branch
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Delete Feature Branch
        uses: dawidd6/action-delete-branch@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branches: ${{ github.head_ref }}
      
      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Feature branch deleted automatically after merge.'
            })

  # ========================================
  # SUMMARY
  # ========================================

  pr-check-summary:
    name: ✅ PR Check Summary
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-check, unit-tests, integration-tests, code-quality, security-scan, code-coverage, lint-check]
    steps:
      - name: All Checks Passed
        run: |
          echo "🎉 All PR checks passed successfully!"
          echo "✅ Build verification"
          echo "✅ Unit tests"
          echo "✅ Integration tests"
          echo "✅ Code quality"
          echo "✅ Security scan"
          echo "✅ Code coverage"
          echo "✅ Lint check"
      
      - name: Comment on PR
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All automated checks passed! Ready for review.'
            })
