name: PR Checks

on:
  pull_request:
    branches: [ master, develop ]
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build-verification:
    name: 🔨 Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn clean compile -q

      - name: Notify Slack - Build Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *Build Failed* on PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}\n*Branch*: `${{ github.head_ref }}`\n*Author*: ${{ github.actor }}\n*Link*: ${{ github.event.pull_request.html_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  build-and-test:
    name: 🧪 Test Execution
    runs-on: ubuntu-latest
    needs: build-verification
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Tests
        run: mvn test -Dsurefire.suiteXmlFiles=testng_vwo_pom.xml

      - name: Generate JaCoCo Report
        if: always()
        run: mvn jacoco:report

      - name: Upload Coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          files: ./target/site/jacoco/jacoco.xml
          fail_ci_if_error: false

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            target/surefire-reports/
            target/site/allure-maven-plugin/
            target/site/jacoco/
          retention-days: 30

      - name: Notify Slack - Tests Failed
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ *Tests Failed* on PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}\n*Branch*: `${{ github.head_ref }}`\n*Author*: ${{ github.actor }}\n*Link*: ${{ github.event.pull_request.html_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  code-quality:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    needs: build-verification
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Checkstyle
        run: mvn checkstyle:check
        continue-on-error: true

      - name: SonarQube Scan
        if: ${{ secrets.SONAR_TOKEN != '' }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=selenium-automation-framework \
            -Dsonar.organization=prasad291024 \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}
        continue-on-error: true

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: build-verification
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: OWASP Dependency Check
        run: mvn dependency-check:check
        continue-on-error: true

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-report
          path: target/dependency-check-report.html
          retention-days: 30

  docker-build:
    name: 🐳 Docker Build Verification
    runs-on: ubuntu-latest
    needs: build-verification
    steps:
      - uses: actions/checkout@v4

      - name: Verify Docker Compose
        run: docker compose config

      - name: Pull Docker Images
        run: docker compose pull
        continue-on-error: true

  notify-success:
    name: ✅ Notify Success
    runs-on: ubuntu-latest
    needs: [ build-and-test, code-quality, security-scan, docker-build ]
    if: success()
    steps:
      - name: Notify Slack - All Checks Passed
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "✅ *All Checks Passed* on PR #${{ github.event.pull_request.number }} - ${{ github.event.pull_request.title }}\n*Branch*: `${{ github.head_ref }}`\n*Author*: ${{ github.actor }}\n*Link*: ${{ github.event.pull_request.html_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
