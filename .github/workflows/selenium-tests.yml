name: Selenium Test Automation

on:
  push:
    branches: [ master, develop ]
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to run tests against
        required: true
        default: qa
        type: choice
        options: [ qa, prod ]
      browser:
        description: Browser to run tests on
        required: true
        default: chrome
        type: choice
        options: [ chrome, firefox ]
      app:
        description: App to run
        required: true
        default: all
        type: choice
        options: [ all, vwo, orangehrm, katalon ]
      suite_type:
        description: Suite type to run
        required: true
        default: ui
        type: choice
        options: [ ui, bdd, both ]
      retry_count:
        description: Retries per failed test (0 = strict)
        required: true
        default: '1'
        type: choice
        options: [ '1', '0', '2', '3' ]

jobs:
  test:
    name: Run ${{ matrix.app }}-${{ matrix.suite_type }} on ${{ matrix.browser }}
    if: ${{ github.event_name != 'workflow_dispatch' || (((github.event.inputs.app == 'all' || github.event.inputs.app == matrix.app) && (github.event.inputs.suite_type == 'both' || github.event.inputs.suite_type == matrix.suite_type)) && github.event.inputs.browser == matrix.browser) }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: vwo
            browser: chrome
            suite: testng_vwo.xml
            suite_type: ui
          - app: vwo
            browser: firefox
            suite: testng_vwo.xml
            suite_type: ui
          - app: vwo
            browser: chrome
            suite: testng_vwo_bdd.xml
            suite_type: bdd
          - app: orangehrm
            browser: chrome
            suite: testng_orangehrm.xml
            suite_type: ui
          - app: orangehrm
            browser: firefox
            suite: testng_orangehrm.xml
            suite_type: ui
          - app: orangehrm
            browser: chrome
            suite: testng_orangehrm_bdd.xml
            suite_type: bdd
          - app: vwo
            browser: chrome
            suite: testng_vwo_bdd.xml
            suite_type: bdd
          - app: orangehrm
            browser: chrome
            suite: testng_orangehrm_bdd.xml
            suite_type: bdd
          - app: katalon
            browser: chrome
            suite: testng_katalon.xml
            suite_type: ui
          - app: katalon
            browser: firefox
            suite: testng_katalon.xml
            suite_type: ui
          - app: katalon
            browser: chrome
            suite: testng_katalon_bdd.xml
            suite_type: bdd

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Chrome
        if: matrix.browser == 'chrome'
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup Firefox
        if: matrix.browser == 'firefox'
        uses: browser-actions/setup-firefox@v1
        with:
          firefox-version: latest

      - name: Run Tests
        run: |
          mvn clean test \
            -Dapp=${{ matrix.app }} \
            -Dbrowser=${{ matrix.browser }} \
            -Denv=${{ github.event.inputs.environment || 'qa' }} \
            -DretryCount=${{ github.event.inputs.retry_count || '1' }} \
            -Dsurefire.suiteXmlFiles=${{ matrix.suite }}

      - name: Generate Allure Report
        if: always()
        run: mvn allure:report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-${{ matrix.app }}-${{ matrix.suite_type }}-${{ matrix.browser }}
          path: target/site/allure-maven-plugin/
          retention-days: 30

      - name: Upload Screenshots on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.app }}-${{ matrix.suite_type }}-${{ matrix.browser }}
          path: screenshots/
          retention-days: 7

      - name: Notify Slack - Test Run Complete
        if: always() && secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "*Test Run ${{ job.status }}* | App: `${{ matrix.app }}` | Suite: `${{ matrix.suite_type }}` | Browser: `${{ matrix.browser }}` | Env: `${{ github.event.inputs.environment || 'qa' }}`\n*Branch*: `${{ github.ref_name }}`\n*Triggered by*: `${{ github.actor }}`\n*Run*: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  nightly-report:
    name: Nightly Summary
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule' && always() && secrets.SLACK_WEBHOOK_URL != ''
    steps:
      - name: Notify Slack - Nightly Summary
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "*Nightly Test Run Complete*\n*Status*: `${{ needs.test.result }}`\n*Run*: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
